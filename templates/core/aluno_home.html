<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Área do Aluno</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #e8f5e9; padding-top: 50px; }
        .welcome-box { background: white; padding: 40px; border-radius: 15px; display: inline-block; border: 2px solid #2e7d32; }
    </style>
</head>
<body>
    <div class="welcome-box">
        <h1>👋 Bem-vindo, {{ user.username }}!</h1>
        <p>Você está na sua área de estudos. Pronto para jogar?</p>
        <div style="margin-top: 20px;">
            <button>🎮 Ver Jogos Disponíveis</button>
        </div>
        <hr>
        <form action="{% url 'logout' %}" method="post" style="display: inline;">
            {% csrf_token %}
            <button type="submit" style="background: none; border: none; color: red; cursor: pointer; text-decoration: underline; padding: 0;">
                Sair da Conta
            </button>
        </form>
    </div>
</body>
</html>
